
<!DOCTYPE html>
<html lang="id">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3b82f6">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SERAHTERIMAYUK</title>

<style>

body{
font-family:Arial;
margin:0;

background:
url("bgbodi2.png");

background-size:cover;
background-position:center;
background-attachment:fixed;
}
/* LOGIN */

#loginPage{
display:flex;
justify-content:center;
align-items:center;
height:100vh;

background:
url("bglogin2.png");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
}
.loginBox{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);

padding:35px;
border-radius:16px;
width:270px;
text-align:center;

border:1px solid rgba(255,255,255,0.3);

box-shadow:
0 15px 35px rgba(0,0,0,0.35),
0 0 8px rgba(255,255,255,0.2) inset;
}
.loginBox input,
.loginBox button{

width:100%;
box-sizing:border-box;

padding:10px;

margin-top:12px;

border-radius:8px;

font-size:14px;
}
.loginBox button{

border:none;

background:#3b82f6;

color:white;

font-weight:600;

cursor:pointer;

transition:0.2s;

}

.loginBox button:hover{

background:#2563eb;

}
.loginBox h2{
margin-top:0;
margin-bottom:10px;
color:#2563eb;
}
/* MOBILE */

@media (max-width:600px){

.header{
flex-direction:column;
align-items:flex-start;
}

.headerRight{
width:100%;
display:flex;
justify-content:space-between;
}

.searchWrap input{
width:120px;
}

}

/* HEADER */

.header{
background:white;
padding:12px 16px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}
.headerRight{
display:flex;
align-items:center;
gap:10px;
}

/* SEARCH HEADER */

.searchWrap{
position:relative;
}

.searchWrap input{
width:150px;
padding:6px 8px 6px 24px;
border-radius:6px;
border:1px solid #ccc;
font-size:12px;
}

.searchIcon{
position:absolute;
left:6px;
top:4px;
font-size:12px;
color:#888;
}

/* CONTAINER */

.container{
max-width:700px;
margin:auto;
padding:20px;
}

/* ALERT */

#newPostAlert{
display:none;
background:#3b82f6;
color:white;
text-align:center;
padding:8px;
border-radius:8px;
margin-bottom:10px;
cursor:pointer;
}

/* POST BOX */

.postBox{
background:rgba(255,255,255,0.95);

padding:18px;

border-radius:14px;

margin-bottom:18px;

box-shadow:
0 10px 25px rgba(0,0,0,0.25);

backdrop-filter:blur(3px);
}

.postTitle{
font-weight:bold;
color:#3b82f6;
margin-bottom:6px;
}
.post{
background:rgba(255,255,255,0.96);

padding:16px;

margin-bottom:16px;

border-radius:14px;

box-shadow:
0 10px 25px rgba(0,0,0,0.25);

backdrop-filter:blur(3px);
}
textarea{
width:100%;
border:none;
outline:none;
resize:none;
font-size:14px;
}
.container{
max-width:700px;
margin:auto;
padding:20px;

background:rgba(255,255,255,0.15);
border-radius:20px;

backdrop-filter:blur(5px);
}
/* TOOLBAR */

.toolbar{
display:flex;
justify-content:space-between;
margin-top:10px;
}

button{
border:none;
padding:7px 12px;
border-radius:6px;
cursor:pointer;
}

.btnBlue{background:#3b82f6;color:white}
.btnGreen{background:#22c55e;color:white}
.btnRed{background:#ef4444;color:white}

/* CARD */

.card{
background:white;
padding:16px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
margin-bottom:14px;
}

.postHeader{
display:flex;
justify-content:space-between;
}

.postUser{
font-weight:bold;
}

.postRight{
text-align:right;
}

.postTime{
font-size:11px;
color:#777;
}

.postActions span{
cursor:pointer;
margin-left:6px;
}

/* COMMENT */

.comment{
border-top:1px solid #eee;
margin-top:6px;
padding-top:6px;
font-size:13px;
}

.commentTime{
font-size:11px;
color:#777;
margin-left:6px;
}

.commentInput{
display:flex;
gap:6px;
margin-top:6px;
}

.commentInput input{
flex:1;
padding:6px;
border:1px solid #ccc;
border-radius:6px;
}

/* DATE GROUP */

.dateTitle{
font-size:12px;
font-weight:400;
color:#8a8a8a;
margin:14px 0 6px 0;
cursor:pointer;
}

/* MEDIA */

.postimg{
width:100%;
max-height:380px;
object-fit:cover;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}

/* MODAL */

#imgModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:999;
}

#imgModal img,
#imgModal video{
max-width:90%;
max-height:90%;
border-radius:10px;
}

/* SEARCH HIGHLIGHT */

mark{
background:#ffe58a;
padding:1px 3px;
border-radius:3px;
}
.avatar{

width:32px;
height:32px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

color:white;
font-weight:bold;
font-size:14px;

margin-right:8px;

flex-shrink:0;

}

.postUserWrap{
display:flex;
align-items:center;
}
</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginPage">
<div class="loginBox">
<h2>SERAHTERIMAYUK</h2>
<input id="nameInput" placeholder="Nama Kamu">
<input id="passInput" type="password" placeholder="Password">

<button class="btnBlue" style="width:100%;margin-top:10px" onclick="login()">Masuk</button></div>
</div>

<!-- APP -->

<div id="app" style="display:none">

<div class="header">

<b>SERAHTERIMAYUK</b>

<div class="headerRight">

<div class="searchWrap">
<span class="searchIcon">🔎</span>
<input id="searchInput" placeholder="Cari..." onkeyup="renderPosts()">
</div>

<span id="username"></span>

<button class="btnRed" onclick="logout()">Logout</button>

</div>

</div>

<div class="container">

<div id="newPostAlert" onclick="loadPosts()">
🔔 Posting baru tersedia — klik untuk melihat
</div>

<div class="postBox">

<div class="postTitle">
Apa yang ingin kamu sampaikan?
</div>

<textarea id="postText" rows="3"></textarea>

<input type="file" id="fileInput" accept="image/*,video/*" style="display:none">

<div id="preview"></div>

<div class="toolbar">

<button class="btnBlue" onclick="fileInput.click()">
📎 Lampirkan Photo
</button>

<button class="btnGreen" onclick="createPost()">
Posting
</button>

</div>

</div>

<div id="feed"></div>

</div>

</div>

<div id="imgModal" onclick="this.style.display='none'"></div>
<audio id="notifSound" src="notif.wav" preload="auto"></audio>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import {
getFirestore,
collection,
addDoc,
updateDoc,
deleteDoc,
doc,
onSnapshot,
query,
orderBy
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"

/* FIREBASE CONFIG */

const firebaseConfig = {
apiKey: "AIzaSyDhFBEBFv6uxX15Z8VHsxiqNU_qI5Zjue0",
authDomain: "serahterimayuk.firebaseapp.com",
projectId: "serahterimayuk",
storageBucket: "serahterimayuk.firebasestorage.app",
messagingSenderId: "121409645308",
appId: "1:121409645308:web:76c709eb49ef0a1d5e4579",
measurementId: "G-HJQTCQ4721"
}

const app = initializeApp(firebaseConfig)
const db = getFirestore(app)

/* USER */

let user=localStorage.getItem("st_user")
let role=localStorage.getItem("st_role")

let allPosts=[]
let lastPostCount=0

/* LOGIN */

window.login=async function(){

let name=nameInput.value.trim()
let pass=passInput.value.trim()

if(!name || !pass){
alert("Isi username dan password")
return
}

let res=await fetch("user.json")
let users=await res.json()

let valid=users.find(u=>u.username===name && u.password===pass)

if(!valid){
alert("Username atau password salah")
return
}

localStorage.setItem("st_user",valid.username)
localStorage.setItem("st_role",valid.role)

location.reload()

}

/* LOGOUT */

window.logout=function(){

localStorage.removeItem("st_user")
localStorage.removeItem("st_role")

location.reload()

}

/* TIME */

function formatTime(){
let d=new Date()
return d.toLocaleString("id-ID")
}

/* LOAD REALTIME POSTS */

function startRealtime(){

const q=query(collection(db,"posts"),orderBy("time"))

onSnapshot(q,(snapshot)=>{

let posts=[]

snapshot.forEach(doc=>{

let data=doc.data()
data.id=doc.id
posts.push(data)

})

if(posts.length>lastPostCount){

let newPosts=posts.slice(lastPostCount)

newPosts.forEach(p=>{

if(p.user!==user){
document.getElementById("notifSound").play().catch(()=>{})
}

})

document.getElementById("newPostAlert").style.display="block"

}

lastPostCount=posts.length
allPosts=posts

renderPosts()

})

}

/* CREATE POST */
if(text===""){
alert("Isi posting dulu")
return
}

window.createPost=async function(){

let text=postText.value.trim()

if(text==="")return

await addDoc(collection(db,"posts"),{

user:user,
text:text,
time:Date.now(),
comments:[]

})

postText.value=""

}

/* COMMENT */

window.comment=async function(i){

let text=document.getElementById("c"+i).value

if(!text)return

let post=allPosts[i]

post.comments.push({
user:user,
text:text,
time:formatTime()
})

await updateDoc(doc(db,"posts",post.id),{
comments:post.comments
})

}

/* DELETE */

window.deletePost=async function(i){

if(!confirm("Hapus posting?"))return

let post=allPosts[i]

await deleteDoc(doc(db,"posts",post.id))

}

/* EDIT */

window.editPost=async function(i,text){

let newText=prompt("Edit posting",text)

if(!newText)return

let post=allPosts[i]

await updateDoc(doc(db,"posts",post.id),{
text:newText
})

}
function renderPosts(){

let feed=document.getElementById("feed")
let search=document.getElementById("searchInput").value.toLowerCase()

feed.innerHTML=""

let posts=[...allPosts].reverse()

posts.forEach((p,i)=>{

if(search && !p.text.toLowerCase().includes(search)) return

let d=new Date(p.time)

let time=d.toLocaleString("id-ID")

let card=`

<div class="post">

<div class="postHeader">

<div class="postUserWrap">

<div class="avatar" style="background:#3b82f6">
${p.user.charAt(0).toUpperCase()}
</div>

<div class="postUser">${p.user}</div>

</div>

<div class="postRight">

<div class="postTime">${time}</div>

<div class="postActions">

${p.user===user||role==="admin"
?`<span onclick="editPost(${i},\`${p.text}\`)">✏️</span>
<span onclick="deletePost(${i})">🗑</span>`
:""}

</div>

</div>

</div>

<div>${p.text}</div>

${p.comments?.map(c=>`

<div class="comment">

<b>${c.user}</b>: ${c.text}

<span class="commentTime">${c.time}</span>

</div>

`).join("")||""}

<div class="commentInput">

<input id="c${i}" placeholder="Tulis komentar">

<button onclick="comment(${i})">Kirim</button>

</div>

</div>

`

feed.innerHTML+=card

})

}
/* INIT */

function init(){

user=localStorage.getItem("st_user")
role=localStorage.getItem("st_role")

if(!user){

loginPage.style.display="flex"
app.style.display="none"

}else{

loginPage.style.display="none"
app.style.display="block"

username.innerText=user

startRealtime()

}

}

init()

</script>
</body>
</html>
