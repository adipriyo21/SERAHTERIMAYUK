<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SERAHTERIMAYUK</title>

<style>
body{font-family:Arial;margin:0;background:#eef3fb}
header{background:#3b82f6;color:white;padding:12px;text-align:center}
#loginPage{display:flex;justify-content:center;align-items:center;height:100vh}
.loginBox{background:white;padding:25px;border-radius:8px;box-shadow:0 0 10px rgba(0,0,0,.1)}
input,button{padding:10px;margin-top:10px;width:100%}
#app{display:none;padding:10px}
.postBox{background:white;padding:10px;margin-top:10px;border-radius:6px}
#newPostAlert{display:none;background:#2563eb;color:white;padding:8px;text-align:center;cursor:pointer}
</style>

</head>

<body>

<header>SERAHTERIMAYUK</header>

<div id="newPostAlert" onclick="loadPosts()">🔔 Posting baru tersedia — klik untuk melihat</div>

<div id="loginPage">
<div class="loginBox">
<h3>Login</h3>
<input id="username" placeholder="Masukkan username">
<button onclick="login()">Masuk</button>
</div>
</div>

<div id="app">

<textarea id="postText" placeholder="Tulis laporan..." style="width:100%;height:80px"></textarea>

<button onclick="sendPost()">Kirim</button>

<div id="posts"></div>

</div>

<audio id="notifSound" src="notif.wav" preload="auto"></audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE CONFIG */

const firebaseConfig = {
apiKey: "AIzaSyDhFBEBFv6uxX15Z8VHsxiqNU_qI5Zjue0",
authDomain: "serahterimayuk.firebaseapp.com",
projectId: "serahterimayuk",
storageBucket: "serahterimayuk.firebasestorage.app",
messagingSenderId: "121409645308",
appId: "1:121409645308:web:76c709eb49ef0a1d5e4579",
measurementId: "G-HJQTCQ4721"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* LOGIN */

let user = localStorage.getItem("user");

if(user){

document.getElementById("loginPage").style.display="none";
document.getElementById("app").style.display="block";

startRealtime();

}

window.login=function(){

let u=document.getElementById("username").value;

if(!u)return alert("Isi username");

localStorage.setItem("user",u);

location.reload();

}

/* POSTING */

window.sendPost=async function(){

let text=document.getElementById("postText").value;

if(!text)return;

await addDoc(collection(db,"posts"),{
user:user,
text:text,
time:Date.now()
})

document.getElementById("postText").value="";

}

/* REALTIME */

let lastCount=0;

function startRealtime(){

const q=query(collection(db,"posts"),orderBy("time"));

onSnapshot(q,(snapshot)=>{

let posts=[];
snapshot.forEach(doc=>{
posts.push(doc.data())
})

if(posts.length>lastCount){

let newPosts=posts.slice(lastCount);

newPosts.forEach(p=>{

if(p.user!==user){

document.getElementById("notifSound").play().catch(()=>{})

}

})

document.getElementById("newPostAlert").style.display="block";

}

lastCount=posts.length;

renderPosts(posts);

})

}

/* RENDER */

function renderPosts(posts){

let html="";

posts.reverse().forEach(p=>{

html+=`
<div class="postBox">
<b>${p.user}</b><br>
${p.text}
</div>
`;

})

document.getElementById("posts").innerHTML=html;

}

window.loadPosts=function(){

document.getElementById("newPostAlert").style.display="none";

}

</script>

</body>
</html>
