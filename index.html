<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard DT</title>

<style>
*{box-sizing:border-box}
body{
  font-family:Arial, sans-serif;
  margin:0;
  background:linear-gradient(135deg,#dbeafe,#eef3fb);
}

/* HEADER AUTO HIDE */
header{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
  padding:15px;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(10px);
  transition:0.5s;
  z-index:1000;
}
header.hide{
  opacity:0;
  pointer-events:none;
}
header button{
  padding:10px 18px;
  border:none;
  border-radius:12px;
  background:#e5e7eb;
  cursor:pointer;
}

/* PAGE */
.page{
  display:none;
  padding:80px 15px;
  max-width:1200px;
  margin:auto;
}
.active{display:block}

/* PREVIEW FULL */
#preview{
  max-width:100%;
  width:100%;
  padding:90px 40px;
}

/* TITLE TIMBUL + GLOW TIPIS */
@keyframes glowPulse{
  0%,100%{
    text-shadow:
      1px 1px 0 #fff,
      2px 2px 0 #ccc,
      3px 3px 0 #aaa,
      0 0 4px #0ea5e9;
  }
  50%{
    text-shadow:
      1px 1px 0 #fff,
      2px 2px 0 #ccc,
      3px 3px 0 #aaa,
      0 0 6px #0ea5e9;
  }
}
.title{
  text-align:center;
  font-family:'Stencil Std', 'Stencil', sans-serif;
  font-size:64px;
  color:#0ea5e9;
  animation:glowPulse 2s infinite alternate;
  margin-bottom:30px;
}

/* LIST */
#list{
  display:flex;
  flex-direction:column;
  gap:18px;
}

/* CARD */
.card{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:28px;
  border-radius:20px;
  color:#fff;
  transition:0.3s;
}

/* STATUS */
.safe{background:#22c55e;}
.warning{background:#facc15;color:#000;}
.overdue{background:#ef4444;}

/* ANIMASI */
@keyframes blinkFast{
  0%{opacity:1}
  50%{opacity:0.4}
  100%{opacity:1}
}
@keyframes blinkSlow{
  0%{opacity:1}
  50%{opacity:0.6}
  100%{opacity:1}
}
.overdue{animation:blinkFast 1s infinite;}
.warning{animation:blinkSlow 2s infinite;}

/* TEXT */
.left b{font-size:22px;}
.ket{font-size:34px;font-weight:bold;}
.card small{font-size:18px;}
.timer{font-size:28px;font-weight:bold;}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #ddd;
}
.action{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
}

/* SUGGEST */
#suggestBox{
  background:white;
  border-radius:10px;
  max-height:150px;
  overflow:auto;
}
#suggestBox div{
  padding:8px;
  cursor:pointer;
}
#suggestBox div:hover{background:#eef}

/* OUTPUT */
#listOutput{display:flex;flex-direction:column;gap:10px;}
.item{
  display:flex;
  justify-content:space-between;
  padding:14px;
  background:white;
  border-radius:10px;
  border:1px solid #ddd;
}
.doneBtn{
  background:#22c55e;
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
}

/* RESPONSIVE HP */
@media (max-width:768px){
  #preview{
    padding:80px 10px;
  }
  .title{
    font-size:26px;
  }
  .card{
    flex-direction:column;
    align-items:flex-start;
    padding:16px;
    gap:8px;
  }
  .left b{
    font-size:14px;
  }
  .ket{
    font-size:20px;
  }
  .card small{
    font-size:12px;
  }
  .timer{
    font-size:18px;
    align-self:flex-end;
  }
}
</style>
</head>

<body>

<header id="topbar">
<button id="navInput">Input</button>
<button id="navOutput">Output</button>
<button id="navPreview">Preview</button>
</header>

<!-- INPUT -->
<div id="input" class="page active">
<input id="voucher" placeholder="No Voucher">
<input id="model" placeholder="Model ID">
<div id="suggestBox"></div>
<input id="ket" placeholder="Keterangan">
<input type="date" id="tanggal">
<input type="time" id="jam">
<button id="btnSave" class="action">Simpan</button>
</div>

<!-- OUTPUT -->
<div id="output" class="page">
<input id="search" placeholder="Cari No Voucher...">
<div id="listOutput"></div>
</div>

<!-- PREVIEW -->
<div id="preview" class="page">
<h1 class="title">DASHBOARD DT RUANG</h1>
<div id="list"></div>
</div>

<script>
const topbar=document.getElementById("topbar");
let hideTimer;
function showBar(){
  topbar.classList.remove("hide");
  clearTimeout(hideTimer);
  hideTimer=setTimeout(()=>topbar.classList.add("hide"),2000);
}
document.addEventListener("mousemove",showBar);
document.addEventListener("touchstart",showBar);

function openFullscreen(){
  let el=document.documentElement;
  if(el.requestFullscreen) el.requestFullscreen();
}

/* DATA MASTER */
const master={
"md001":"Siapkan bahan A",
"md002":"Cek kualitas",
"md003":"Packing barang"
};
let data=JSON.parse(localStorage.getItem("data")||"[]");

/* NAV */
function show(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  if(id==="preview") openFullscreen();
  render();
  renderOutput();
}
navInput.onclick=()=>show("input");
navOutput.onclick=()=>show("output");
navPreview.onclick=()=>show("preview");

/* SUGGEST */
model.oninput=function(){
  let val=this.value.toLowerCase();
  suggestBox.innerHTML="";
  if(!val)return;
  Object.keys(master).forEach(key=>{
    if(key.includes(val)){
      let d=document.createElement("div");
      d.innerText=key.toUpperCase();
      d.onclick=function(){
        model.value=key.toUpperCase();
        ket.value=master[key];
        suggestBox.innerHTML="";
      };
      suggestBox.appendChild(d);
    }
  });
  if(master[val]) ket.value=master[val];
};

/* SAVE */
btnSave.onclick=function(){
  if(!voucher.value || !model.value || !tanggal.value || !jam.value){
    alert("Lengkapi data!");
    return;
  }
  data.push({
    id:Date.now(),
    voucher:voucher.value,
    model:model.value,
    ket:ket.value,
    tanggal:tanggal.value,
    jam:jam.value
  });
  localStorage.setItem("data",JSON.stringify(data));
  voucher.value=""; model.value=""; ket.value=""; tanggal.value=""; jam.value=""; suggestBox.innerHTML="";
  render(); renderOutput();
};

/* TIME */
function diff(i){return new Date(i.tanggal+"T"+i.jam)-new Date();}
function format(ms){
  let s=Math.abs(ms)/1000;
  let d=Math.floor(s/86400); s%=86400;
  let h=Math.floor(s/3600); s%=3600;
  let m=Math.floor(s/60); let sec=Math.floor(s%60);
  let r=[];
  if(d>0) r.push(d+" hr");
  if(h>0 || d>0) r.push(h+" jam");
  if(m>0 || h>0 || d>0) r.push(m+" menit");
  r.push(sec+" detik");
  return (ms<0?"- ":"")+r.join(" ");
}

/* PREVIEW */
function render(){
  data=JSON.parse(localStorage.getItem("data")||"[]");
  list.innerHTML="";
  [...data].sort((a,b)=>diff(a)-diff(b)).forEach(i=>{
    let s=diff(i);
    let cls=s<0?"overdue":(s<3600000?"warning":"safe"); // <1jam warning
    let d=document.createElement("div");
    d.className="card "+cls;
    d.innerHTML=`
    <div class="left">
      <b>${i.voucher} | ${i.model}</b>
      <div class="ket">${i.ket}</div>
      <small>${i.tanggal} ${i.jam}</small>
    </div>
    <div class="timer">${format(s)}</div>
    `;
    list.appendChild(d);
  });
}

/* OUTPUT */
search.oninput=renderOutput;
function renderOutput(){
  data=JSON.parse(localStorage.getItem("data")||"[]");
  let keyword=search.value.toLowerCase();
  listOutput.innerHTML="";
  data.filter(i=>i.voucher.toLowerCase().includes(keyword))
  .forEach(i=>{
    let d=document.createElement("div");
    d.className="item";
    d.innerHTML=`
      <div>
        <b>${i.voucher}</b><br>
        ${i.model}<br>
        ${i.ket}
      </div>
    `;
    let btn=document.createElement("button");
    btn.innerText="SUDAH SETOR"; btn.className="doneBtn";
    btn.onclick=function(){
      let newData=data.filter(x=>x.id!==i.id);
      localStorage.setItem("data",JSON.stringify(newData));
      data=newData;
      render(); renderOutput();
    };
    d.appendChild(btn); listOutput.appendChild(d);
  });
}

/* AUTO UPDATE PREVIEW */
setInterval(()=>{if(document.getElementById("preview").classList.contains("active")) render();},1000);

render(); renderOutput();
</script>
</body>
</html>
