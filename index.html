<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SERAHTERIMAYUK</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("backgroundbody.jpg") center/cover no-repeat fixed;
}

/* LOGIN */

#loginPage{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:url("backgroundlogin.jpg") center/cover no-repeat fixed;
}

.loginBox{

background:rgba(255,255,255,0.85);
padding:30px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
width:260px;
text-align:center;

}

.loginBox input{

width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;

}

.loginBox button{

width:100%;
padding:10px;
margin-top:10px;
border:none;
background:#3b82f6;
color:white;
border-radius:8px;
cursor:pointer;

}

/* APP */

#app{
display:none;
}

.header{

background:white;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);

}

.feed{
max-width:600px;
margin:auto;
padding:10px;
}

.postbox{

background:white;
padding:10px;
border-radius:10px;
margin-bottom:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);

}

.postbox textarea{

width:100%;
height:60px;
resize:none;
border-radius:8px;
border:1px solid #ccc;
padding:8px;
box-sizing:border-box;

}

.postbox button{

margin-top:8px;
padding:8px 14px;
background:#3b82f6;
border:none;
color:white;
border-radius:6px;
cursor:pointer;

}

.card{

background:white;
padding:10px;
border-radius:10px;
margin-bottom:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);

}

.postHeader{
display:flex;
justify-content:space-between;
}

.postUser{
font-weight:bold;
}

.postTime{
font-size:12px;
color:#666;
}

.postimg{
width:100%;
margin-top:8px;
border-radius:8px;
}

.comment{
font-size:13px;
margin-top:5px;
}

.commentInput{
display:flex;
margin-top:6px;
}

.commentInput input{

flex:1;
padding:5px;
border-radius:6px;
border:1px solid #ccc;

}

.commentInput button{

margin-left:4px;
border:none;
background:#3b82f6;
color:white;
border-radius:6px;
padding:5px 10px;

}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginPage">

<div class="loginBox">

<h3>Login</h3>

<input id="loginUser" placeholder="Username">

<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Masuk</button>

</div>

</div>

<!-- APP -->

<div id="app">

<div class="header">

<div id="username"></div>

<button onclick="logout()">Keluar</button>

</div>

<div class="feed">

<div class="postbox">

<textarea id="postText" placeholder="Tulis sesuatu..."></textarea>

<input type="file" id="fileInput">

<div id="preview"></div>

<button onclick="createPost()">Posting</button>

</div>

<div id="feed"></div>

</div>

</div>

<script>

let user=localStorage.getItem("st_user")

/* LOGIN */

async function login(){

let user=document.getElementById("loginUser").value
let pass=document.getElementById("loginPass").value

let res=await fetch("login.php",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
user:user,
pass:pass
})

})

let data=await res.json()

if(data.status==="ok"){

localStorage.setItem("st_user",user)

location.reload()

}else{

alert("Username atau password salah")

}

}

/* LOGOUT */

function logout(){

localStorage.removeItem("st_user")

location.reload()

}

/* INIT */

function init(){

user=localStorage.getItem("st_user")

if(user){

loginPage.style.display="none"

app.style.display="block"

username.innerText=user

loadPosts()

}else{

loginPage.style.display="flex"

app.style.display="none"

}

}

init()

/* PREVIEW FILE */

fileInput.onchange=function(){

let file=this.files[0]

if(!file)return

let url=URL.createObjectURL(file)

if(file.type.startsWith("image")){

preview.innerHTML=`<img src="${url}" class="postimg">`

}else{

preview.innerHTML=`<video src="${url}" class="postimg" controls></video>`

}

}

/* FORMAT TIME */

function now(){

let d=new Date()

return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")+" "+d.toTimeString().slice(0,5)

}

/* LOAD POSTS */

async function loadPosts(){

let res=await fetch("load.php")

let posts=await res.json()

let feed=document.getElementById("feed")

feed.innerHTML=""

posts.reverse().forEach((p,i)=>{

let media=""

if(p.file){

if(p.file.match(/jpg|png|jpeg|gif/i)){

media=`<img src="${p.file}" class="postimg">`

}else{

media=`<video src="${p.file}" class="postimg" controls></video>`

}

}

let comments=""

if(p.comments){

p.comments.forEach(c=>{

comments+=`<div class="comment"><b>${c.user}</b>: ${c.text} <span style="font-size:11px;color:#777">${c.time}</span></div>`

})

}

let div=document.createElement("div")

div.className="card"

div.innerHTML=`

<div class="postHeader">

<div class="postUser">${p.user}</div>

<div class="postTime">${p.time}</div>

</div>

<div>${p.text}</div>

${media}

${comments}

<div class="commentInput">

<input id="c${i}" placeholder="Komentar...">

<button onclick="comment(${i})">Kirim</button>

</div>

`

feed.appendChild(div)

})

}

/* POST */

async function createPost(){

let text=postText.value
let file=fileInput.files[0]

if(!text && !file)return

let form=new FormData()

form.append("user",user)
form.append("text",text)
form.append("time",now())

if(file)form.append("file",file)

await fetch("save.php",{method:"POST",body:form})

postText.value=""
preview.innerHTML=""
fileInput.value=""

loadPosts()

}

/* COMMENT */

async function comment(i){

let text=document.getElementById("c"+i).value

if(!text)return

await fetch("comment.php",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({

index:i,
user:user,
text:text,
time:now()

})

})

loadPosts()

}

</script>

</body>
</html>
