<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SERAHTERIMAYUK</title>

<style>

body{
font-family:Arial;
margin:0;
background:#eef3fb;
}

/* LOGIN */

#loginPage{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.loginBox{
background:white;
padding:30px;
border-radius:10px;
width:260px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.loginBox input{
width:100%;
padding:8px;
margin-top:10px;
}

.loginBox button{
width:100%;
padding:10px;
margin-top:10px;
background:#3b82f6;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

/* HEADER */

.header{
background:white;
padding:10px;
display:flex;
justify-content:space-between;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

/* POST BOX */

.postBox{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

textarea{
width:100%;
border:1px solid #ccc;
border-radius:6px;
padding:8px;
}

/* BUTTON */

.btn{
background:#22c55e;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

/* CARD */

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.user{
font-weight:bold;
}

.time{
font-size:11px;
color:#777;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginPage">

<div class="loginBox">

<h2>SERAHTERIMAYUK</h2>

<input id="nameInput" placeholder="Nama">

<button onclick="login()">Masuk</button>

</div>

</div>

<!-- APP -->

<div id="app" style="display:none">

<div class="header">

<b>SERAHTERIMAYUK</b>

<div>
<span id="username"></span>
<button onclick="logout()">Logout</button>
</div>

</div>

<div class="container">

<div class="postBox">

<textarea id="postText" rows="3" placeholder="Apa yang ingin kamu sampaikan?"></textarea>

<br><br>

<button class="btn" onclick="createPost()">Posting</button>

</div>

<div id="feed"></div>

</div>

</div>


<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDhFBEBFv6uxX15Z8VHsxiqNU_qI5Zjue0",
  authDomain: "serahterimayuk.firebaseapp.com",
  projectId: "serahterimayuk",
  storageBucket: "serahterimayuk.firebasestorage.app",
  messagingSenderId: "121409645308",
  appId: "1:121409645308:web:76c709eb49ef0a1d5e4579",
  measurementId: "G-HJQTCQ4721"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

</script>

<script>

/* USER */

let user = localStorage.getItem("st_user")

/* LOGIN */

function login(){

let name=nameInput.value.trim()

if(!name){
alert("Isi nama")
return
}

localStorage.setItem("st_user",name)

location.reload()

}

/* LOGOUT */

function logout(){

localStorage.removeItem("st_user")

location.reload()

}

/* TIME */

function formatTime(){

let d=new Date()

return d.toLocaleString("id-ID")

}

/* CREATE POST */

function createPost(){

let text=postText.value.trim()

if(!text)return

db.ref("posts").push({

user:user,
text:text,
time:formatTime()

})

postText.value=""

}

/* LOAD POSTS REALTIME */

db.ref("posts").on("value",function(snapshot){

let data=snapshot.val()

let html=""

for(let id in data){

let p=data[id]

html+=`

<div class="card">

<div class="user">${p.user}</div>

<div>${p.text}</div>

<div class="time">${p.time}</div>

</div>

`

}

feed.innerHTML=html

})

/* INIT */

function init(){

if(!user){

loginPage.style.display="flex"

}else{

loginPage.style.display="none"
app.style.display="block"

username.innerText=user

}

}

init()

</script>

</body>
</html>
